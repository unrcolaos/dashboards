<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNCT-SWAP — All Performance Indicators</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --exceeds: #1d4e89;    --exceeds-bg: #dbeafe;  --exceeds-mid: #60a5fa;
    --meets: #2d6a4f;      --meets-bg: #d8f3dc;    --meets-mid: #52b788;
    --approaches: #92400e; --approaches-bg: #fef3c7; --approaches-mid: #f59e0b;
    --missing: #7f1d1d;    --missing-bg: #fee2e2;  --missing-mid: #f87171;
    --not-assessed: #374151; --not-assessed-bg: #f3f4f6; --not-assessed-mid: #9ca3af;
    --bg: #fafaf8; --surface: #ffffff; --border: #e8e4df;
    --text: #1a1614; --text-muted: #6b6560; --accent: #5A383C;
    --header-h: 60px; --filter-h: 0px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); }

  /* ── HEADER ── */
  .site-header {
    background: #392427; color: #fff; padding: 0 2rem;
    position: sticky; top: 0; z-index: 200;
    display: flex; align-items: center; justify-content: space-between;
    height: var(--header-h); border-bottom: 3px solid var(--accent);
  }
  .header-left { display: flex; align-items: center; gap: 0.9rem; }
  .header-logo { height: 38px; width: auto; display: block; }
  .header-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
  .site-header h1 { font-family: 'Lato', sans-serif; font-weight: 700; font-size: 1.02rem; letter-spacing: 0.01em; }
  .header-right { display: flex; align-items: center; gap: 1rem; }
  .header-badge { background: var(--accent); color: #fff; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 12px; border-radius: 2px; }
  .back-home-link {
    display: inline-flex; align-items: center; gap: 0.3rem;
    color: #fff; text-decoration: none;
    font-size: 0.78rem; font-weight: 600; letter-spacing: 0.02em;
    border: 1.5px solid var(--accent); border-radius: 4px;
    padding: 5px 14px; transition: background 0.15s, color 0.15s;
  }
  .back-home-link:hover { background: var(--accent); color: #fff; }
  .print-btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    color: #fff; background: transparent;
    font-family: 'Roboto', sans-serif;
    font-size: 0.78rem; font-weight: 600; letter-spacing: 0.02em;
    border: 1.5px solid var(--accent); border-radius: 4px;
    padding: 5px 14px; cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .print-btn:hover:not(:disabled) { background: var(--accent); color: #fff; }
  .print-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  @keyframes spin { 100% { transform: rotate(360deg); } }

  /* ── PAGE HERO ── */
  .page-hero {
    background: linear-gradient(135deg, #392427 55%, #5A383C 100%);
    color: #fff; padding: 2.5rem 2rem 2rem; position: relative; overflow: hidden;
  }
  .page-hero::before {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .page-hero-inner { max-width: 1100px; margin: 0 auto; position: relative; }
  .page-hero-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #FFA0AC; margin-bottom: 0.5rem; }
  .page-hero h2 { font-family: 'Lato', sans-serif; font-size: clamp(1.6rem, 3vw, 2.4rem); line-height: 1.1; margin-bottom: 0.5rem; }
  .page-hero-sub { color: #b0a89c; font-size: 0.9rem; }

  /* KPI SUMMARY CARDS */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-top: 1.75rem;
  }
  .summary-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 1.1rem 1.3rem;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    text-align: left;
    width: 100%;
    font-family: 'Roboto', sans-serif;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  }
  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .summary-card.exceeds::before { background: var(--exceeds-mid); }
  .summary-card.meets::before { background: var(--meets-mid); }
  .summary-card.approaches::before { background: var(--approaches-mid); }
  .summary-card.missing::before { background: var(--missing-mid); }
  .summary-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    border-color: rgba(255,255,255,0.22);
  }
  .summary-card.selected {
    border-color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.12);
  }
  .summary-num {
    font-family: 'Lato', sans-serif;
    font-size: 2.6rem;
    line-height: 1;
    margin-bottom: 0.2rem;
  }
  .summary-card.exceeds .summary-num { color: var(--exceeds-mid); }
  .summary-card.meets .summary-num { color: var(--meets-mid); }
  .summary-card.approaches .summary-num { color: var(--approaches-mid); }
  .summary-card.missing .summary-num { color: var(--missing-mid); }
  .summary-label { font-size: 0.8rem; color: #b0a89c; font-weight: 500; }

  /* ── STICKY FILTER BAR ── */
  .filter-bar-wrap {
    background: var(--surface); border-bottom: 1px solid var(--border);
    position: sticky; top: var(--header-h); z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .filter-bar-inner {
    max-width: 1100px; margin: 0 auto;
    padding: 0.9rem 2rem; display: flex; flex-direction: column; gap: 0.65rem;
  }
  .filter-row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
  .filter-row-label {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-muted);
    min-width: 80px; flex-shrink: 0;
  }
  .chip {
    padding: 5px 13px; border-radius: 99px;
    border: 1.5px solid var(--border);
    background: var(--surface); font-family: 'Roboto', sans-serif;
    font-size: 0.78rem; font-weight: 500; cursor: pointer;
    color: var(--text-muted); transition: all 0.15s;
    display: flex; align-items: center; gap: 0.35rem;
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { background: #1a1614; color: #fff; border-color: #1a1614; }
  .chip.active.exceeds  { background: var(--exceeds);    border-color: var(--exceeds); }
  .chip.active.meets    { background: var(--meets);      border-color: var(--meets); }
  .chip.active.approaches { background: #b45309;         border-color: #b45309; }
  .chip.active.missing  { background: var(--missing);    border-color: var(--missing); }
  .chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .chip-dot.exceeds   { background: var(--exceeds-mid); }
  .chip-dot.meets     { background: var(--meets-mid); }
  .chip-dot.approaches { background: var(--approaches-mid); }
  .chip-dot.missing   { background: var(--missing-mid); }
  .filter-meta {
    display: flex; align-items: center; justify-content: space-between;
    gap: 1rem; padding: 0.3rem 0 0;
  }
  .filter-count { font-size: 0.78rem; color: var(--text-muted); }
  .filter-count strong { color: var(--text); }
  .clear-btn {
    font-size: 0.75rem; font-weight: 600; color: var(--accent);
    background: none; border: none; cursor: pointer;
    padding: 0; display: none;
  }
  .clear-btn.visible { display: block; }
  .clear-btn:hover { text-decoration: underline; }

  /* ── MAIN ── */
  .main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem 5rem; }

  /* ── DIMENSION GROUP ── */
  .dim-section { margin-bottom: 3rem; }
  .dim-section-header {
    display: flex; align-items: center; gap: 0.75rem;
    margin-bottom: 1.5rem; padding-bottom: 0.75rem;
    border-bottom: 2px solid var(--border);
  }
  .dim-section-name {
    font-family: 'Lato', sans-serif; font-size: 1.35rem; line-height: 1;
  }
  .dim-section-desc {
    font-size: 0.82rem; color: var(--text-muted); line-height: 1.5;
    margin-top: 0.2rem; max-width: 680px;
  }
  .dim-section-badges { display: flex; gap: 0.4rem; margin-left: auto; flex-shrink: 0; }
  .dim-badge {
    font-size: 0.68rem; font-weight: 700; padding: 3px 9px;
    border-radius: 99px;
  }
  .dim-badge.exceeds   { background: var(--exceeds-bg);   color: var(--exceeds); }
  .dim-badge.meets     { background: var(--meets-bg);     color: var(--meets); }
  .dim-badge.approaches { background: var(--approaches-bg); color: var(--approaches); }
  .dim-badge.missing   { background: var(--missing-bg);   color: var(--missing); }

  /* ── INDICATOR DETAIL CARD ── */
  .indicator-detail {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 1.25rem; overflow: hidden;
    scroll-margin-top: calc(var(--header-h) + 80px);
    transition: box-shadow 0.15s;
  }
  .indicator-detail:target, .indicator-detail.highlight {
    box-shadow: 0 0 0 3px var(--accent);
  }
  .ind-header {
    padding: 1.4rem 1.75rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 1rem; flex-wrap: wrap;
  }
  .ind-header-left { flex: 1; min-width: 0; }
  .ind-pi-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.3rem; }
  .ind-title { font-family: 'Lato', sans-serif; font-size: 1.25rem; line-height: 1.25; margin-bottom: 0.45rem; }
  .ind-summary { font-size: 0.86rem; color: var(--text-muted); line-height: 1.6; max-width: 580px; }
  .ind-header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem; flex-shrink: 0; }
  .status-pill { font-size: 0.72rem; font-weight: 600; padding: 5px 14px; border-radius: 99px; letter-spacing: 0.03em; white-space: nowrap; }
  .pill-exceeds    { background: var(--exceeds-bg);    color: var(--exceeds); }
  .pill-meets      { background: var(--meets-bg);      color: var(--meets); }
  .pill-approaches { background: var(--approaches-bg); color: var(--approaches); }
  .pill-missing    { background: var(--missing-bg);    color: var(--missing); }
  .pill-not-assessed { background: var(--not-assessed-bg); color: var(--not-assessed); }

  /* trend mini */
  .trend-mini { display: flex; gap: 0.35rem; align-items: flex-start; }
  .trend-mini-item { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .trend-dot-sm { width: 9px; height: 9px; border-radius: 50%; }
  .dot-exceeds    { background: var(--exceeds-mid); }
  .dot-meets      { background: var(--meets-mid); }
  .dot-approaches { background: var(--approaches-mid); }
  .dot-missing    { background: var(--missing-mid); }
  .dot-not-assessed { background: #d1d5db; }
  .trend-year-sm  { font-size: 0.58rem; color: var(--text-muted); }
  .trend-status-sm { font-size: 0.52rem; font-weight: 600; color: var(--text-muted); text-align: center; max-width: 36px; line-height: 1.2; }
  .trend-status-sm.s-exceeds    { color: var(--exceeds); }
  .trend-status-sm.s-meets      { color: var(--meets); }
  .trend-status-sm.s-approaches { color: var(--approaches); }
  .trend-status-sm.s-missing    { color: var(--missing); }

  /* achieved bar */
  .achieved-bar {
    margin: 0 1.75rem 1.25rem;
    background: #f9f7f4; border: 1px solid var(--border); border-radius: 8px;
    padding: 0.9rem 1.1rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
  }
  .achieved-label { font-size: 0.76rem; color: var(--text-muted); font-weight: 500; }
  .achieved-dots { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .achieved-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--exceeds-mid); }
  .unachieved-dot { width: 10px; height: 10px; border-radius: 50%; background: #e5e7eb; border: 1px solid #d1d5db; }
  .achieved-fraction { font-size: 0.84rem; font-weight: 600; margin-left: auto; }
  .achieved-fraction .num { color: var(--exceeds); }
  .achieved-fraction .denom { color: var(--text-muted); }
  .missing-banner {
    margin: 0 1.75rem 1.25rem;
    background: var(--missing-bg); border: 1px solid #fca5a5;
    border-radius: 8px; padding: 0.85rem 1.1rem;
    font-size: 0.81rem; color: var(--missing); font-weight: 500;
  }

  /* criteria */
  .criteria-section { padding: 1.5rem 1.75rem; }
  .criteria-title { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1rem; }
  .criteria-levels { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.85rem; }
  .criteria-level { border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .criteria-level-header { padding: 0.55rem 0.9rem; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .level-approaches .criteria-level-header { background: var(--approaches-bg); color: var(--approaches); }
  .level-meets      .criteria-level-header { background: var(--meets-bg);      color: var(--meets); }
  .level-exceeds    .criteria-level-header { background: var(--exceeds-bg);    color: var(--exceeds); }
  .criteria-level-rule {
    padding: 0.5rem 0.9rem; font-size: 0.7rem; line-height: 1.4;
    color: var(--text-muted); font-style: italic;
    border-bottom: 1px dashed var(--border); background: rgba(0,0,0,0.015);
    display: flex; align-items: flex-start; gap: 0.4rem;
  }
  .criteria-level-rule::before { content: '↳'; font-style: normal; opacity: 0.7; }
  .criteria-list { padding: 0.8rem 0.9rem; list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
  .criteria-item { display: flex; gap: 0.55rem; align-items: flex-start; font-size: 0.81rem; line-height: 1.5; }
  .criteria-check { width: 17px; height: 17px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.62rem; font-weight: 700; margin-top: 1px; }
  .check-met   { background: var(--exceeds-bg); color: var(--exceeds); }
  .check-unmet { background: #f3f4f6; color: #9ca3af; border: 1px solid #e5e7eb; }

  /* threshold-style criteria (any-N-of-M indicators) */
  .threshold-list { list-style: none; display: flex; flex-direction: column; gap: 0.7rem; margin-bottom: 1.1rem; }
  .threshold-item { display: flex; gap: 0.6rem; align-items: flex-start; font-size: 0.85rem; line-height: 1.5; }
  .threshold-item-text { color: var(--text); }
  .threshold-legend { display: flex; flex-wrap: wrap; gap: 1.1rem; padding-top: 0.9rem; border-top: 1px solid var(--border); font-size: 0.72rem; color: var(--text-muted); }
  .threshold-count { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.9rem; }

  /* tiered-group criteria (PI 6.1 special case: sequential gates, middle tier is N-of-M) */
  .tier-groups { display: flex; flex-direction: column; gap: 0.85rem; }
  .tier-group { background: var(--bg); border-radius: 8px; padding: 0.85rem 1rem; }
  .tier-group-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.6rem; }
  .tier-group-label { font-size: 0.78rem; font-weight: 600; }
  .tier-group-rule { font-size: 0.68rem; color: var(--text-muted); }
  .tier-group-items { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .tier-item { display: flex; gap: 0.55rem; align-items: flex-start; font-size: 0.81rem; line-height: 1.5; }

  /* empty state */
  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
  .empty-state h3 { font-family: 'Lato', sans-serif; font-size: 1.4rem; margin-bottom: 0.5rem; color: var(--text); }
  .empty-clear { margin-top: 1.2rem; display: inline-block; font-size: 0.85rem; font-weight: 600; color: var(--accent); cursor: pointer; text-decoration: underline; }

  footer { text-align: center; padding: 2rem; font-size: 0.75rem; color: var(--text-muted); border-top: 1px solid var(--border); margin-top: 2rem; }

  @media (max-width: 700px) {
    .site-header { padding: 0 1rem; }
    .header-divider, .site-header h1 { display: none; }
    .header-logo { height: 32px; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
    .summary-num { font-size: 2.1rem; }
    .criteria-levels { grid-template-columns: 1fr; }
    .filter-bar-inner { padding: 0.75rem 1rem; }
    .main { padding: 1.5rem 1rem 4rem; }
    .ind-header { padding: 1.1rem; flex-direction: column; }
    .ind-header-right { align-items: flex-start; }
    .criteria-section { padding: 1.1rem; }
    .achieved-bar, .missing-banner { margin: 0 1rem 1rem; }
    .filter-row-label { min-width: 60px; font-size: 0.65rem; }
    .dim-section-badges { display: none; }
  }

  /* LARGE SCREENS */
  @media (min-width: 1600px) {
    html { font-size: 112.5%; }
    .page-hero-inner, .filter-bar-inner, .main { max-width: 1320px; }
  }
  @media (min-width: 2000px) {
    html { font-size: 125%; }
    .page-hero-inner, .filter-bar-inner, .main { max-width: 1480px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-left">
    <img src="un_logo_lao.png" alt="United Nations Lao PDR" class="header-logo">
    <span class="header-divider"></span>
    <h1>UNCT-SWAP Gender Equality Scorecard</h1>
    <span class="header-badge">Lao PDR</span>
  </div>
  <div class="header-right" id="header-right">
    <button id="print-btn" class="print-btn" onclick="downloadIndicatorsPDF()" title="Download a PDF of the indicators currently shown">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
      Print Page
    </button>
    <a href="gender_scorecard.html" class="back-home-link">← Back to home</a>
  </div>
</header>

<section class="page-hero">
  <div class="page-hero-inner">
    <div class="page-hero-label">Performance Indicators</div>
    <h2>All 15 Indicators</h2>
    <p class="page-hero-sub">7 dimensions · assessed 2022–2025 · click a card or use the filters below</p>
    <div class="summary-grid" id="summary-grid"></div>
  </div>
</section>

<div class="filter-bar-wrap" id="filter-bar-wrap">
  <div class="filter-bar-inner">
    <div class="filter-row">
      <span class="filter-row-label">Dimension</span>
      <button class="chip active" data-dim="all" onclick="setDimFilter('all', this)">All</button>
      <button class="chip" data-dim="1" onclick="setDimFilter('1', this)">1 · Planning</button>
      <button class="chip" data-dim="2" onclick="setDimFilter('2', this)">2 · Programming</button>
      <button class="chip" data-dim="3" onclick="setDimFilter('3', this)">3 · Partnerships</button>
      <button class="chip" data-dim="4" onclick="setDimFilter('4', this)">4 · Leadership</button>
      <button class="chip" data-dim="5" onclick="setDimFilter('5', this)">5 · Gender Arch.</button>
      <button class="chip" data-dim="6" onclick="setDimFilter('6', this)">6 · Financial</button>
      <button class="chip" data-dim="7" onclick="setDimFilter('7', this)">7 · Results</button>
    </div>
    <div class="filter-row" id="status-filter-row">
      <span class="filter-row-label">Status</span>
      <button class="chip active" data-status="all" onclick="setStatusFilter('all', this)">All</button>
      <button class="chip" data-status="exceeds" onclick="setStatusFilter('exceeds', this)">
        <span class="chip-dot exceeds"></span><span id="chip-count-exceeds">Exceeds</span>
      </button>
      <button class="chip" data-status="meets" onclick="setStatusFilter('meets', this)">
        <span class="chip-dot meets"></span><span id="chip-count-meets">Meets</span>
      </button>
      <button class="chip" data-status="approaches" onclick="setStatusFilter('approaches', this)">

// ── FETCH & PARSE DATA ───────────────────────────────────────────────────────
async function loadData() {
  // 1. Fetch Indicators Data (statuses + years) — independent of criteria.
  try {
    const indRes  = await fetch(INDICATORS_CSV_URL);
    const indText = await indRes.text();
    const indParsed = Papa.parse(indText, { header: false, skipEmptyLines: true }).data;

    const fresh = indParsed
      .filter(r => r[1] && String(r[1]).trim().match(/^PI \d/))
      .map(r => ({
        dimension: String(r[0] || '').trim(), 
        pi_id: String(r[1] || '').trim(), 
        indicator_name: String(r[2] || '').trim(),
        status_2022: String(r[3] || '').trim(), 
        status_2023: String(r[4] || '').trim(), 
        status_2024: String(r[5] || '').trim(), 
        status_2025: String(r[6] || '').trim(),
        latest_status: String(r[7] || '').trim(), 
        last_assessed: String(r[8] || '').trim()
      }));

    // Only replace if the fetch actually returned indicator rows.
    if (fresh.length > 0) INDICATORS = fresh;
  } catch(e) {
    console.warn("Live indicators fetch failed.", e);
  }

  // 2. Fetch Criteria Data with extremely loose matching — independent of #1.
  try {
    const critRes = await fetch(CRITERIA_CSV_URL);
    const critText = await critRes.text();

    // Parse without assuming row 1 is the header — sheets sometimes have
    // instructional note rows above the real header (as happened here: a
    // 2-row note preceded the actual "PI ID, Level, ..." header on row 3).
    // We scan the first few rows for one that looks like a real header
    // (contains a cell matching "PI ID" once non-letters are stripped),
    // and treat that as row 0 for parsing. If no such row is found within
    // the first 5 rows, we fall back to assuming row 1 (index 0) is the
    // header, preserving the old behavior.
    const rawRows = Papa.parse(critText, { header: false, skipEmptyLines: true }).data;
    const normalize = (s) => String(s || '').toLowerCase().replace(/[^a-z]/g, '');
    let headerRowIndex = rawRows.findIndex(row =>
      row.some(cell => normalize(cell) === 'piid')
    );
    if (headerRowIndex === -1) headerRowIndex = 0;

    const headerRow = rawRows[headerRowIndex];
    const dataRows = rawRows.slice(headerRowIndex + 1);
    const critParsed = dataRows.map(row => {
      const obj = {};
      headerRow.forEach((h, i) => { obj[h] = row[i]; });
      return obj;
    });

    if (headerRowIndex > 0) {
      console.warn(
        `[Criteria fetch] Skipped ${headerRowIndex} leading row(s) before ` +
        `finding the real header row. Consider removing note rows from the ` +
        `top of the Criteria tab so row 1 is the header.`
      );
    }

    // Accumulate live criteria into a temp map. We do NOT wipe the hardcoded
    // criteria in PI_META — those stay as a fallback so the card UI never
    // collapses if this sheet is unpublished, empty, or has odd headers.
    const liveCriteria = {};

    if (critParsed && critParsed.length > 0) {
      critParsed.forEach(row => {
         const keys = Object.keys(row);

         const findKey = (str) => keys.find(k => k.toLowerCase().replace(/[^a-z]/g, '').includes(str));

         const idKey = findKey('piid');
         const levelKey = findKey('level');
         const critTextKey = findKey('text');
         const metKey = findKey('met');
         const notesKey = findKey('notes');

         // Exact match for 'criterion' to avoid grabbing 'criteriontext'
         const critLetterKey = keys.find(k => k.toLowerCase().replace(/[^a-z]/g, '') === 'criterion');

         // Normalize all whitespace (including non-breaking spaces, tabs, etc.
         // that can sneak in from pasted/PDF-sourced data) to a single regular
         // space, so "PI 1.1" matches PI_META's key even if the sheet cell
         // contains an invisible whitespace variant.
         const id = idKey ? String(row[idKey] || '').replace(/\s+/g, ' ').trim() : null;
         if (!id || !PI_META[id]) return;

         const levelText = levelKey ? String(row[levelKey] || '').trim() : null;
         const criterionLetter = critLetterKey ? String(row[critLetterKey] || '').trim() : null;
         const critText = critTextKey ? String(row[critTextKey] || '').trim() : null;
         const isMetStr = metKey ? String(row[metKey] || '').trim().toUpperCase() : "FALSE";
         const noteText = notesKey ? String(row[notesKey] || '').replace(/\s+/g, ' ').trim() : '';

         if (critText && (levelText || THRESHOLD_INDICATORS[id])) {
            const rawText = criterionLetter ? `(${criterionLetter}) ${critText}` : critText;
            const formattedText = mdBoldToHtml(rawText);
            (liveCriteria[id] = liveCriteria[id] || []).push({
               level: levelText,
               text: formattedText,
               met: (isMetStr === 'TRUE' || isMetStr === '1' || isMetStr === 'YES'),
               note: noteText
            });
         }
      });
    }

    // Only override an indicator's hardcoded criteria when the sheet actually
    // returned rows for it. Indicators with no live rows keep their fallback.
    // Threshold indicators (blank Level column) used to be skipped entirely
    // to avoid a partial/level-gated capture silently dropping rows (e.g.
    // PI 5.2's inconsistently-filled Level column) — but that also blocked
    // genuine edits, like updates to PI 4.1, from ever showing up live. Now
    // we only fall back to the hardcoded list when the live capture has
    // FEWER rows than what's already there (a sign of a partial/broken
    // fetch); a live row count equal to or greater than the existing count
    // is treated as a real update and applied.
    Object.keys(liveCriteria).forEach(id => {
      if (!PI_META[id] || liveCriteria[id].length === 0) return;
      const existingCount = (PI_META[id].criteria || []).length;
      if (THRESHOLD_INDICATORS[id] && liveCriteria[id].length < existingCount) return;
      PI_META[id].criteria = liveCriteria[id];
    });
  } catch(e) {
    console.warn("Live criteria fetch failed — using built-in criteria as fallback.", e);
  }
  
  render();
  readUrlParams();
}

// ── HELPERS FOR ORIGINAL DOTS & PILLS ────────────────────────────────────────
// Convert a sheet cell's markdown bold (**like this**) into <strong> tags.
// We first escape any HTML so stray <, >, & in the sheet can't inject markup,
// then turn paired ** into <strong>…</strong>. Unpaired ** are left as-is.
function mdBoldToHtml(str) {
  const escaped = String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  return escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
}

function dotClass(s) {
  if(!s) return 'dot-not-assessed';
  const l = s.toLowerCase();
  if(l.includes('exceeds')) return 'dot-exceeds';
  if(l.includes('meets')) return 'dot-meets';
  if(l.includes('approaches')) return 'dot-approaches';
  if(l.includes('missing')) return 'dot-missing';
  return 'dot-not-assessed';
}
function pillClass(s) {
  if(!s) return 'pill-not-assessed';
  const l = s.toLowerCase();
  if(l.includes('exceeds')) return 'pill-exceeds';
  if(l.includes('meets')) return 'pill-meets';
  if(l.includes('approaches')) return 'pill-approaches';
  if(l.includes('missing')) return 'pill-missing';
  return 'pill-not-assessed';
}
function statusAbbr(s) {
  if(!s) return 'N/A';
  const l = s.toLowerCase();
  if(l.includes('exceeds')) return 'Exc.';
  if(l.includes('meets')) return 'Meet';
  if(l.includes('approaches')) return 'Appr.';
  if(l.includes('missing')) return 'Miss';
  return 'N/A';
}
function statusSClass(s) {
  if(!s) return '';
  const l = s.toLowerCase();
  if(l.includes('exceeds')) return 's-exceeds';
  if(l.includes('meets')) return 's-meets';
  if(l.includes('approaches')) return 's-approaches';
  if(l.includes('missing')) return 's-missing';
  return '';
}

// ── RENDER & FILTER LOGIC ────────────────────────────────────────────────────
let activeDim = 'all';
let activeStatus = 'all';

function preserveScroll(action) {
  const y = window.scrollY;
  action();
  window.scrollTo(0, y);
  requestAnimationFrame(() => window.scrollTo(0, y));
}

function render() {
  const main = document.getElementById('main-content');
  const grid = document.getElementById('summary-grid');
  if (!main || !grid) return;

  // 1. Build Summary Cards
  const statusCounts = { Exceeds: 0, Meets: 0, Approaches: 0, Missing: 0 };
  INDICATORS.forEach(ind => {
    if(!ind.latest_status) return;
    const l = ind.latest_status.toLowerCase();
    if(l.includes('exceeds')) statusCounts.Exceeds++;
    else if(l.includes('meets')) statusCounts.Meets++;
    else if(l.includes('approaches')) statusCounts.Approaches++;
    else if(l.includes('missing')) statusCounts.Missing++;
  });
  
  grid.innerHTML = Object.entries(statusCounts).map(([key, val]) => {
    const k = key.toLowerCase();
    const sel = activeStatus === k ? 'selected' : '';
    return `<button class="summary-card ${k} ${sel}" onclick="toggleStatusFromCard('${k}')">
      <div class="summary-num">${val}</div>
      <div class="summary-label">${key}</div>
    </button>`;
  }).join('');

  // 2. Filter indicators
  const filtered = INDICATORS.filter(ind => {
    const dimNum = ind.pi_id.match(/\d/)[0];
    if (activeDim !== 'all' && dimNum !== activeDim) return false;
    if (activeStatus !== 'all' && !(ind.latest_status||'').toLowerCase().includes(activeStatus)) return false;
    return true;
  });

  // Update Counters
  ['exceeds','meets','approaches','missing'].forEach(s => {
    const label = s.charAt(0).toUpperCase() + s.slice(1);
    const n = INDICATORS.filter(i => {
      const dn = i.pi_id.match(/\d/)[0];
      if (activeDim !== 'all' && dn !== activeDim) return false;
      return (i.latest_status||'').toLowerCase().includes(s);
    }).length;
    const el = document.getElementById(`chip-count-${s}`);
    if (el) el.textContent = `${label} ${n}`;
  });

  const countEl = document.getElementById('filter-count');
  if (countEl) countEl.innerHTML = `Showing <strong>${filtered.length}</strong> of ${INDICATORS.length} indicators`;
  
  const clearBtn = document.getElementById('clear-btn');
  if (clearBtn) clearBtn.classList.toggle('visible', activeDim !== 'all' || activeStatus !== 'all');

  if (filtered.length === 0) {
    main.innerHTML = `<div class="empty-state">
      <h3>No indicators match these filters</h3>
      <p>Try removing a filter to see results.</p>
      <span class="empty-clear" onclick="clearFilters()">Clear all filters</span>
    </div>`;
    return;
  }

  // 3. Group by Dimension
  const dimMap = {};
  filtered.forEach(ind => {
    const dn = ind.pi_id.match(/\d/)[0];
    if (!dimMap[dn]) dimMap[dn] = [];
    dimMap[dn].push(ind);
  });

  let html = '';
  Object.keys(dimMap).sort().forEach(dn => {
    const inds = dimMap[dn];
    const meta = DIMENSIONS_META[dn] || { name: `Dimension ${dn}`, desc: '' };

    const dimCounts = {};
    inds.forEach(i => { 
        const s = i.latest_status ? i.latest_status.trim() : "Not Assessed";
        dimCounts[s] = (dimCounts[s]||0)+1; 
    });
    const badgesHtml = Object.entries(dimCounts).map(([s,n]) =>
      `<span class="dim-badge ${s.toLowerCase().split(' ')[0]}">${n} ${s}</span>`
    ).join('');

    html += `<div class="dim-section" data-dim="${dn}">
      <div class="dim-section-header">
        <div>
          <div class="dim-section-name">${dn}. ${meta.name}</div>
          ${meta.desc ? `<div class="dim-section-desc">${meta.desc}</div>` : ''}
        </div>
        <div class="dim-section-badges">${badgesHtml}</div>
      </div>
      ${inds.map(ind => renderCard(ind)).join('')}
    </div>`;
  });

  main.innerHTML = html;
}

function renderCard(ind) {
  const meta = PI_META[ind.pi_id] || { title: ind.indicator_name, summary: '', criteria: [] };
  const latest = ind.latest_status || 'Not assessed';
  const anchor = ind.pi_id.replace(/\s+/g, '-').toLowerCase();
  const year = ind.last_assessed || '';

  // Trend dots (2022-2025 layout).
  // The sheet keeps every year filled (carried forward) so the main-page graph
  // works, but a year was only *actually* assessed up to column I (last_assessed).
  // Any year more recent than last_assessed is carried-forward padding, so we
  // render it grey / N/A here instead of repeating the last colour.
  const years = ['2022','2023','2024','2025'];
  const statuses = [ind.status_2022, ind.status_2023, ind.status_2024, ind.status_2025];
  const lastYr = parseInt(ind.last_assessed, 10);   // column I
  const trendHtml = years.map((yr, i) => {
    let s = statuses[i] || 'Not assessed';
    if (lastYr && parseInt(yr, 10) > lastYr) s = 'Not assessed';  // carried-forward → grey
    return `<div class="trend-mini-item">
      <div class="trend-dot-sm ${dotClass(s)}" title="${yr}: ${s}"></div>
      <div class="trend-year-sm">${yr}</div>
      <div class="trend-status-sm ${statusSClass(s)}">${statusAbbr(s)}</div>
    </div>`;
  }).join('');

  // Criteria arrays
  const metCriteria  = meta.criteria.filter(c => c.met);
  const totalCriteria = meta.criteria.length;

  // Achieved Bar (Restored from source 1)
  // Standalone single-measure indicators (e.g. a survey threshold) don't have
  // a meaningful "X of Y criteria met" tally — each level is its own bar, not
  // a checklist to accumulate — so meta.noAchievedBar opts them out of this box.
  let achievedHtml = '';
  if (meta.noAchievedBar) {
    // no achieved bar / missing banner for this indicator
  } else if (latest.toLowerCase().includes('missing') && metCriteria.length === 0) {
    achievedHtml = `<div class="missing-banner">⚠ No criteria met. Action required to reach Approaches level.</div>`;
  } else if (totalCriteria > 0) {
    const dotsHtml = meta.criteria.map(c => {
      const label = c.level || 'Criterion';
      return c.met
        ? `<div class="achieved-dot" title="${label}: met"></div>`
        : `<div class="unachieved-dot" title="${label}: not met"></div>`;
    }).join('');
    achievedHtml = `<div class="achieved-bar">
      <span class="achieved-label">Criteria achieved (${year} assessment):</span>
      <div class="achieved-dots">${dotsHtml}</div>
      <div class="achieved-fraction"><span class="num">${metCriteria.length}</span><span class="denom"> / ${totalCriteria} criteria met</span></div>
    </div>`;
  }

  // Criteria Table — three display modes.
  // 1) PI 6.1 special case: a hybrid shape (sequential gates, but the middle
  //    tier needs any-2-of-3) that doesn't fit either general pattern below.
  //    Hardcoded rather than generalized, since it's a one-off.
  // 2) Threshold indicators: same criteria list at every level, only the
  //    required count changes — single checklist instead of 3 columns.
  // 3) Everything else: original fixed per-level 3-column display.
  let criteriaHtml = '';
  const threshold = THRESHOLD_INDICATORS[ind.pi_id];

  if (ind.pi_id === 'PI 6.1' && totalCriteria >= 6) {
    // Criteria are stored in fixed order: a, b (Approaches, both required),
    // c, d, e (Meets, any 2 of 3), f (Exceeds, requires this specifically).
    const [a, b, c, d, e, f] = meta.criteria;
    const approachesMet = a.met && b.met;
    const meetsCount = [c, d, e].filter(x => x.met).length;
    const meetsMet = approachesMet && meetsCount >= 2;
    const exceedsMet = meetsMet && f.met;

    let computedLevel = 'Missing';
    if (exceedsMet) computedLevel = 'Exceeds';
    else if (meetsMet) computedLevel = 'Meets';
    else if (approachesMet) computedLevel = 'Approaches';

    const tierItem = (item) => `<li class="tier-item ${item.met ? 'is-met' : ''}">
      <span class="criteria-check ${item.met ? 'check-met' : 'check-unmet'}">${item.met ? '✓' : '○'}</span>
      <span class="tier-item-text">${item.text}</span>
    </li>`;

    criteriaHtml = `<div class="criteria-section">
      <div class="criteria-title">Scoring Criteria</div>
      <div class="threshold-count">${metCriteria.length} of ${totalCriteria} criteria met &middot; computed level: <span class="status-pill ${pillClass(computedLevel)}" style="font-size:0.68rem;padding:0.15rem 0.5rem;">${computedLevel}</span></div>
      <div class="tier-groups">
        <div class="tier-group">
          <div class="tier-group-header"><span class="tier-group-label">Approaches</span><span class="tier-group-rule">both required</span></div>
          <ul class="tier-group-items">${tierItem(a)}${tierItem(b)}</ul>
        </div>
        <div class="tier-group">
          <div class="tier-group-header"><span class="tier-group-label">Meets</span><span class="tier-group-rule">requires Approaches, plus any 2 of 3</span></div>
          <ul class="tier-group-items">${tierItem(c)}${tierItem(d)}${tierItem(e)}</ul>
        </div>
        <div class="tier-group">
          <div class="tier-group-header"><span class="tier-group-label">Exceeds</span><span class="tier-group-rule">requires Meets, plus this</span></div>
          <ul class="tier-group-items">${tierItem(f)}</ul>
        </div>
      </div>
    </div>`;
  } else if (ind.pi_id === 'PI 5.2' && totalCriteria >= 3) {
    // (a) gates Approaches alone; Meets/Exceeds need (a) plus either or both
    // of (b)/(c). This doesn't fit the generic "any N of M" pattern (which
    // would wrongly imply (b) and (c) are interchangeable with (a)), so it
    // gets its own two-box layout: box 1 = (a), box 2 = (b)/(c).
    const [a, b, c] = meta.criteria;
    const approachesMet = a.met;
    const meetsMet = a.met && (b.met || c.met);
    const exceedsMet = a.met && b.met && c.met;

    let computedLevel = 'Missing';
    if (exceedsMet) computedLevel = 'Exceeds';
    else if (meetsMet) computedLevel = 'Meets';
    else if (approachesMet) computedLevel = 'Approaches';

    const tierItem = (item) => `<li class="tier-item ${item.met ? 'is-met' : ''}">
      <span class="criteria-check ${item.met ? 'check-met' : 'check-unmet'}">${item.met ? '✓' : '○'}</span>
      <span class="tier-item-text">${item.text}</span>
    </li>`;

    criteriaHtml = `<div class="criteria-section">
      <div class="criteria-title">Scoring Criteria</div>
      <div class="threshold-count">${metCriteria.length} of ${totalCriteria} criteria met &middot; computed level: <span class="status-pill ${pillClass(computedLevel)}" style="font-size:0.68rem;padding:0.15rem 0.5rem;">${computedLevel}</span></div>
      <div class="tier-groups">
        <div class="tier-group">
          <div class="tier-group-header"><span class="tier-group-label">Approaches</span></div>
          <ul class="tier-group-items">${tierItem(a)}</ul>
        </div>
        <div class="tier-group">
          <div class="tier-group-header"><span class="tier-group-label">Meets / Exceeds</span></div>
          <ul class="tier-group-items">${tierItem(b)}${tierItem(c)}</ul>
        </div>
      </div>
      <div class="threshold-legend">
        <span>To Meet: (a) AND any of (b) OR (c)</span>
        <span>To Exceed: ALL of (a), (b), (c)</span>
      </div>
    </div>`;
  } else if (threshold && totalCriteria > 0) {
    const metCount = metCriteria.length;
    let computedLevel = 'Missing';
    if (metCount >= threshold.exceeds) computedLevel = 'Exceeds';
    else if (metCount >= threshold.meets) computedLevel = 'Meets';
    else if (metCount >= threshold.approaches) computedLevel = 'Approaches';

    const itemsHtml = meta.criteria.map(c => `<li class="threshold-item ${c.met ? 'is-met' : ''}">
      <span class="criteria-check ${c.met ? 'check-met' : 'check-unmet'}">${c.met ? '✓' : '○'}</span>
      <span class="threshold-item-text">${c.text}</span>
    </li>`).join('');

    const legendHtml = threshold.rule
      ? `<span>${threshold.rule}</span>`
      : `<span>Approaches: any ${threshold.approaches} of ${totalCriteria} met</span>
        <span>Meets: any ${threshold.meets} of ${totalCriteria} met</span>
        <span>Exceeds: ${threshold.exceeds >= totalCriteria ? `all ${totalCriteria}` : `any ${threshold.exceeds} of ${totalCriteria}`} met</span>`;

    criteriaHtml = `<div class="criteria-section">
      <div class="criteria-title">Scoring Criteria</div>
      <div class="threshold-count">${metCount} of ${totalCriteria} criteria met &middot; computed level: <span class="status-pill ${pillClass(computedLevel)}" style="font-size:0.68rem;padding:0.15rem 0.5rem;">${computedLevel}</span></div>
      <ul class="threshold-list">${itemsHtml}</ul>
      <div class="threshold-legend">
        ${legendHtml}
      </div>
    </div>`;
  } else if (totalCriteria > 0) {
    const levels = ['Approaches','Meets','Exceeds'];
    const levelClass = { Approaches:'level-approaches', Meets:'level-meets', Exceeds:'level-exceeds' };
    const criteriaColsHtml = levels.map(lvl => {
      const items = meta.criteria.filter(c => c.level === lvl);
      const rule = meta.levelRules && meta.levelRules[lvl];
      const ruleHtml = rule ? `<div class="criteria-level-rule">${rule}</div>` : '';
      if (items.length === 0) return `<div class="criteria-level ${levelClass[lvl]}">
        <div class="criteria-level-header">${lvl} Requirements</div>
        ${ruleHtml}
        <ul class="criteria-list"><li class="criteria-item"><span class="criteria-check check-unmet">○</span><span style="font-size:0.81rem;color:#9ca3af">Not separately assessed at this level.</span></li></ul>
      </div>`;
      return `<div class="criteria-level ${levelClass[lvl]}">
        <div class="criteria-level-header">${lvl} Requirements</div>
        ${ruleHtml}
        <ul class="criteria-list">
          ${items.map(c => `<li class="criteria-item"${c.note ? ` title="${c.note.replace(/"/g, '&quot;')}"` : ''}>
            <span class="criteria-check ${c.met ? 'check-met' : 'check-unmet'}">${c.met ? '✓' : '○'}</span>
            <span class="criteria-item-text">${c.text}</span>
          </li>`).join('')}
        </ul>
      </div>`;
    }).join('');
    
    criteriaHtml = `<div class="criteria-section">
      <div class="criteria-title">Scoring Criteria by Level</div>
      <div class="criteria-levels">${criteriaColsHtml}</div>
    </div>`;
  }

  return `<div class="indicator-detail" id="${anchor}">
    <div class="ind-header">
      <div class="ind-header-left">
        <div class="ind-pi-label">${ind.pi_id}</div>
        <div class="ind-title">${meta.title}</div>
        <div class="ind-summary">${meta.summary}</div>
      </div>
      <div class="ind-header-right">
        <span class="status-pill ${pillClass(latest)}">${latest} · ${year}</span>
        <div class="trend-mini">${trendHtml}</div>
      </div>
    </div>
    ${achievedHtml}
    ${criteriaHtml}
  </div>`;
}

function toggleStatusFromCard(status) {
  const chip = document.querySelector(`[data-status="${status}"]`);
  if (activeStatus === status) {
    const allChip = document.querySelector('[data-status="all"]');
    setStatusFilter('all', allChip);
  } else {
    setStatusFilter(status, chip);
  }
}

function setDimFilter(val, btn) {
  preserveScroll(() => {
    activeDim = val;
    document.querySelectorAll('[data-dim]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateUrl(); render();
  });
}

function setStatusFilter(val, btn) {
  preserveScroll(() => {
    activeStatus = val;
    document.querySelectorAll('[data-status]').forEach(b => {
      b.classList.remove('active', 'exceeds', 'meets', 'approaches', 'missing');
    });
    btn.classList.add('active');
    if (val !== 'all') btn.classList.add(val);
    updateUrl(); render();
  });
}

function clearFilters() {
  preserveScroll(() => {
    activeDim    = 'all';
    activeStatus = 'all';
    document.querySelectorAll('[data-dim]').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('[data-status]').forEach(b => {
      b.classList.remove('active','exceeds','meets','approaches','missing');
    });
    document.querySelector('[data-dim="all"]').classList.add('active');
    document.querySelector('[data-status="all"]').classList.add('active');
    updateUrl(); render();
  });
}

function readUrlParams() {
  const params = new URLSearchParams(window.location.search);
  const dim    = params.get('dim');
  const status = params.get('status');

  if (dim && dim !== 'all') {
    const btn = document.querySelector(`[data-dim="${dim}"]`);
    if (btn) setDimFilter(dim, btn);
  }
  if (status && status !== 'all') {
    const btn = document.querySelector(`[data-status="${status}"]`);
    if (btn) setStatusFilter(status, btn);
  }
  if (window.location.hash) {
    // Use getElementById, not querySelector: IDs like "pi-1.1" contain a dot,
    // which querySelector would read as a CSS class selector and fail to match.
    const id = decodeURIComponent(window.location.hash.slice(1));
    let tries = 0;
    const goto = () => {
      const el = document.getElementById(id);
      if (el) {
        // Stop just below the sticky header + filter bar (measured live), plus a
        // small gap — so the card isn't hidden, but isn't pushed too far down.
        const header = document.querySelector('.site-header');
        const filter = document.getElementById('filter-bar-wrap');
        const offset = (header ? header.offsetHeight : 0)
                     + (filter ? filter.offsetHeight : 0) + 16;
        const y = el.getBoundingClientRect().top + window.scrollY - offset;
        window.scrollTo({ top: y, behavior: 'smooth' });
      } else if (tries++ < 20) { setTimeout(goto, 100); }
    };
    goto();
  }
}

function updateUrl() {
  const params = new URLSearchParams();
  if (activeDim    !== 'all') params.set('dim',    activeDim);
  if (activeStatus !== 'all') params.set('status', activeStatus);
  const qs = params.toString();
  history.replaceState(null, '', qs ? `?${qs}` : window.location.pathname);
}

// ── PRINT / EXPORT TO PDF ─────────────────────────────────────────────────────
// Flows the hero + each dimension section across as many A4 pages as needed.
// Each block is captured into its own modest-sized canvas (never one giant
// stacked canvas, which can exceed the browser's max canvas height and fail),
// then packed down the page with a running cursor — splitting a block across a
// page break only when it doesn't fit. Section-aware breaks can be layered on
// later.
function _sliceCanvas(src, sy, sh) {
  sy = Math.max(0, Math.round(sy));
  sh = Math.max(1, Math.round(sh));
  const c = document.createElement('canvas');
  c.width = src.width; c.height = sh;
  c.getContext('2d').drawImage(src, 0, sy, src.width, sh, 0, 0, src.width, sh);
  return c;
}

async function downloadIndicatorsPDF() {
  const printBtn = document.getElementById('print-btn');
  const heroEl   = document.querySelector('.page-hero');
  const mainEl   = document.getElementById('main-content');
  if (!printBtn || !mainEl) return;

  if (typeof html2canvas === 'undefined' || !window.jspdf) {
    alert('PDF libraries are still loading. Please try again in a moment.');
    return;
  }

  const originalHTML = printBtn.innerHTML;
  printBtn.disabled = true;
  printBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 1 0 2.13-5.88L21 8"></path></svg> Generating...`;

  try {
    const logoImg = new Image();
    const logoReady = new Promise(res => { logoImg.onload = () => res(true); logoImg.onerror = () => res(false); });
    logoImg.src = 'un_logo_lao.png';

    const baseOpts = {
      scale: 2,
      useCORS: true,
      windowWidth: document.documentElement.scrollWidth,
      windowHeight: document.documentElement.scrollHeight
    };

    // Ordered list of atomic blocks to flow. Capturing per CARD (not per
    // section) keeps every canvas small AND lets us avoid splitting a card
    // across a page break. Each entry: { el, bg, type }.
    const items = [];
    if (heroEl) items.push({ el: heroEl, bg: '#392427', type: 'hero' });
    const sections = mainEl.querySelectorAll('.dim-section');
    if (sections.length) {
      sections.forEach(sec => {
        const header = sec.querySelector('.dim-section-header');
        if (header) items.push({ el: header, bg: '#fafaf8', type: 'header' });
        sec.querySelectorAll('.indicator-detail').forEach(card => {
          items.push({ el: card, bg: '#fafaf8', type: 'card' });
        });
      });
    }
    if (items.length === (heroEl ? 1 : 0)) {
      // Empty-state (no indicators match the filter) or any other main content.
      items.push({ el: mainEl, bg: '#fafaf8', type: 'card' });
    }

    const blocks = [];
    for (const it of items) {
      const canvas = await html2canvas(it.el, { ...baseOpts, backgroundColor: it.bg });
      blocks.push({ canvas, type: it.type });
    }

    const { jsPDF } = window.jspdf;
    const margin = 6; // mm
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pageW   = pdf.internal.pageSize.getWidth();
    const pageH   = pdf.internal.pageSize.getHeight();
    const renderW = pageW - margin * 2;
    const usableH = pageH - margin * 2;
    const pageBottom = margin + usableH;
    const GAP_MM = 4; // breathing room between stacked blocks

    let cursorY = margin; // current vertical position on the current page (mm)
    const newPage = () => { pdf.addPage(); cursorY = margin; };
    const heightMm = (canvas) => renderW * (canvas.height / canvas.width);

    for (let i = 0; i < blocks.length; i++) {
      const { canvas, type } = blocks[i];
      if (!canvas || !canvas.width || !canvas.height) continue;
      const blockH = heightMm(canvas);

      // Decide whether to break to a new page BEFORE placing this block.
      if (cursorY > margin) {
        if (blockH > usableH) {
          // Taller than a whole page: start fresh so it splits across full pages.
          newPage();
        } else {
          // How much vertical space this block needs to land cleanly. For a
          // dimension header, also reserve room for the first card so the
          // header never ends up orphaned at the bottom of a page.
          let needed = GAP_MM + blockH;
          if (type === 'header' && i + 1 < blocks.length && blocks[i + 1].canvas) {
            needed += GAP_MM + heightMm(blocks[i + 1].canvas);
          }
          if (needed > (pageBottom - cursorY)) newPage();
          else cursorY += GAP_MM;
        }
      }

      if (blockH <= usableH) {
        // Whole block fits on one page — place it intact (no card splitting).
        pdf.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', margin, cursorY, renderW, blockH);
        cursorY += blockH;
      } else {
        // Oversized block (rare): slice it across pages as a fallback.
        const pxPerMm = canvas.width / renderW;
        let srcY = 0, remainingPx = canvas.height;
        while (remainingPx > 0) {
          let availMm = pageBottom - cursorY;
          if (availMm < 6) { newPage(); availMm = usableH; }
          const drawPx = Math.min(availMm * pxPerMm, remainingPx);
          const drawMm = drawPx / pxPerMm;
          const slice  = _sliceCanvas(canvas, srcY, drawPx);
          pdf.addImage(slice.toDataURL('image/jpeg', 0.92), 'JPEG', margin, cursorY, renderW, drawMm);
          cursorY    += drawMm;
          srcY       += drawPx;
          remainingPx -= drawPx;
          if (remainingPx > 0) newPage();
        }
      }
    }

    // Stamp the UN logo in the top-right of page 1, over the hero band.
    const logoOk = await logoReady;
    if (logoOk && logoImg.naturalWidth && logoImg.naturalHeight) {
      const logoH = 9;
      const logoW = logoH * (logoImg.naturalWidth / logoImg.naturalHeight);
      pdf.setPage(1);
      pdf.addImage(logoImg, 'PNG', pageW - margin - logoW - 4, margin + 4, logoW, logoH);
    }

    const today = new Date().toISOString().slice(0, 10);
    pdf.save(`UNCT-SWAP_Indicators_LaoPDR_${today}.pdf`);
  } catch (err) {
    console.error('Failed to generate indicators PDF', err);
    alert('Sorry, something went wrong while generating the PDF. Please try again.');
  } finally {
    printBtn.disabled = false;
    printBtn.innerHTML = originalHTML;
  }
}

  if (typeof Papa === 'undefined') {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js';
    s.onload = loadData;
    document.head.appendChild(s);
  } else {
    loadData();

});
